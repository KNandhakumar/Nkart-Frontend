<div *ngIf="product" class="min-h-screen bg-gray-100 py-10">
    
    <div class="max-w-6xl mx-auto bg-white rounded-xl shadow-lg p-8">

        <div class="grid md:grid-cols-2 gap-10">

            <!-- product image -->
             <div>
                <img [src]="product.imgUrl" class="w-full h-[500px] object-cover rounded-lg">
             </div>

             <!-- product details -->
              <div>
                <h1 class="text-4xl font-bold mb-5">{{product.name}}</h1>
                <p class="text-gray-600 text-lg mb-6">{{product.description}}</p>

                <h2 class="text-3xl text-emerald-600 font-bold mb-8">$ {{product.price}}</h2>

                <div class="flex gap-4">
                    <button (click)="addToCart()" class="bg-yellow-500 cursor-pointer text-white px-8 py-3 rounded-lg">Add To Cart</button>
                    <button [routerLink]="['/cart']" class="bg-sky-500 cursor-pointer text-white px-8 py-3 rounded-lg">Go To Cart</button>
                    <button class="bg-emerald-600 cursor-pointer text-white px-8 py-3 rounded-lg">Buy Now</button>
                </div>
              </div>
        </div>
    </div>
</div>
